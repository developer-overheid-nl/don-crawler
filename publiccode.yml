publiccodeYmlVersion: "0.5"

name: DON publiccode.yml crawler
url: "https://github.com/developer-overheid-nl/don-crawler"
softwareType: standalone/backend
developmentStatus: stable

platforms:
  - linux

categories:
  - data-collection

description:
  nl:
    shortDescription: >-
      Crawler die publiccode.yml bestanden ophaalt voor developer.overheid.nl

    longDescription: |
      De DON publiccode.yml crawler haalt automatisch publiccode.yml
      bestanden op uit publieke Git-repositories van de Nederlandse
      overheid. De gevonden metadata wordt verwerkt en beschikbaar
      gesteld via developer.overheid.nl, zodat open source projecten
      van de overheid beter vindbaar en herbruikbaar worden.

legal:
  license: EUPL-1.2
  mainCopyrightOwner: Geonovum

intendedAudience:
  countries:
    - NL
  scope:
    - government

localisation:
  availableLanguages:
    - nl
  localisationReady: false

maintenance:
  type: internal

  contacts:
    - name: Dimitri van Hees
      email: d.vanhees@geonovum.nl
      affiliation: Geonovum
